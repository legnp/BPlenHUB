name: Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint (non-blocking until legacy `any` backlog is cleared)
        run: npm run lint
        continue-on-error: true

      - run: npm run test

      - run: npm run type-check

      # `npm run build` is intentionally not run here: Vercel's own Preview
      # Deployment (Settings > Git > Commit Status, Preview environment
      # tracking all branches) already performs a real build with the real
      # Preview environment variables on every PR/branch push. Duplicating
      # that here would mean copying production-adjacent secrets into a
      # second secret store for no added coverage.
